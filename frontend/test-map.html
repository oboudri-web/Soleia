<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Soleia Map - Browser Test</title>

  <!--
    Standalone version of /app/frontend/src/components/mapHtml.ts for fast
    iteration in a regular browser (open via `python3 -m http.server` or
    `file://`). Uses public CDNs instead of base64-inlined libs.

    Hardcoded test tokens (safe to commit, public scope):
      - Mapbox token: pk.eyJ1IjoiZW1lcmdlbnQtdGVzdCIsImEiOi...
      - ShadeMap key: same JWT used in production
  -->

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.js"></script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="https://unpkg.com/mapbox-gl-shadow-simulator@latest/dist/mapbox-gl-shadow-simulator.umd.min.js"></script>

  <style>
    html, body, #mapid {
      padding: 0; margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: #f5f5f5;
    }
    .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { display: none !important; }
    #debug {
      position: absolute; top: 8px; left: 8px; z-index: 999;
      background: rgba(0,0,0,0.75); color: white; padding: 8px 12px;
      border-radius: 6px; font-family: monospace; font-size: 11px;
      max-width: 320px; max-height: 60vh; overflow: auto;
      pointer-events: none;
    }
    #toolbar {
      position: absolute; bottom: 8px; left: 8px; z-index: 999;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    #toolbar button {
      background: #F5A623; color: white; border: 0; padding: 6px 10px;
      border-radius: 6px; font-family: sans-serif; font-size: 12px;
      cursor: pointer; font-weight: 600;
    }
    #toolbar input[type=range] {
      flex: 1; min-width: 200px;
    }
    #toolbar #timeLabel {
      background: white; color: #333; padding: 4px 8px; border-radius: 4px;
      font-family: monospace; font-size: 11px;
    }
  </style>
</head>
<body>
  <div id="mapid"></div>

  <pre id="debug">Loading...</pre>

  <div id="toolbar">
    <input type="range" id="timeSlider" min="360" max="1320" step="15" value="900" />
    <span id="timeLabel">15:00</span>
    <button onclick="testTerraces()">Inject 5 terraces</button>
    <button onclick="testManyTerraces()">Inject 50 (cluster)</button>
    <button onclick="testUserLoc()">Test user dot</button>
  </div>

  <script>
    // ─── Public test tokens (safe to commit) ────────────────────────────
    var MAPBOX_TOKEN = (typeof window !== 'undefined' && window.__SOLEIA_MAPBOX_TOKEN__) || 'pk.eyJ1Ijoib2lsaWQiLCJhIjoiY21vY3cwNWJuMDU0cTJxczR0anlvd3praCJ9.5ZFw5_xIZ7mK5GaPgpnjTQ';
    var SHADEMAP_KEY = 'eyJhbGciOiJIUzI1NiJ9.eyJlbWFpbCI6Im9ib3VkcmlAZ21haWwuY29tIiwiY3JlYXRlZCI6MTc3NzE5NjQ0NzAwMiwiaWF0IjoxNzc3MTk2NDQ3fQ.Mu6MZW3988d8F4OHMuNQzUllI46EZscid0sFTofwW_o';

    var dbgEl = document.getElementById('debug');
    function dbg(msg) {
      console.log(msg);
      dbgEl.textContent = (msg + '\n' + dbgEl.textContent).split('\n').slice(0, 25).join('\n');
    }

    var mapLoaded = function (m) {
      return new Promise(function (res) {
        function cb() { if (!m.loaded()) return; m.off('render', cb); res(); }
        m.on('render', cb); cb();
      });
    };

    mapboxgl.accessToken = MAPBOX_TOKEN;
    var map = new mapboxgl.Map({
      container: 'mapid',
      style: 'mapbox://styles/mapbox/streets-v12',
      center: [-1.5536, 47.2184],
      zoom: 15,
    });

    var sunTimes = SunCalc.getTimes(new Date(), 47.2184, -1.5536);
    var nowDate = new Date(sunTimes.sunrise.getTime() + 60 * 60 * 1000);
    var shadeMap = null;

    map.on('load', function () {
      dbg('[map] style loaded');

      // Hide POI / transit / parking / labels (except road labels)
      var hideKeywords = ['poi', 'transit', 'bus', 'tram', 'parking', 'bicycle', 'airport', 'ferry'];
      var keepLabels = ['road-label', 'road_label', 'road-name', 'street'];
      var hidden = 0;
      (map.getStyle().layers || []).forEach(function (l) {
        var lid = (l.id || '').toLowerCase();
        var hide = hideKeywords.some(function (k) { return lid.indexOf(k) !== -1; });
        if (!hide && lid.indexOf('label') !== -1) {
          hide = !keepLabels.some(function (k) { return lid.indexOf(k) !== -1; });
        }
        if (hide) {
          try { map.setLayoutProperty(l.id, 'visibility', 'none'); hidden++; } catch (e) {}
        }
      });
      dbg('[layers] hidden ' + hidden + ' POI/transit/labels');

      // Terraces source + clustering
      map.addSource('soleia-terraces', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
        cluster: true,
        clusterMaxZoom: 15,
        clusterRadius: 50,
        clusterProperties: {
          sunny: ['+', ['get', 'sunny']],
          soonSunny: ['+', ['get', 'soonSunny']],
        },
      });
      map.addLayer({
        id: 'soleia-clusters', type: 'circle', source: 'soleia-terraces',
        filter: ['has', 'point_count'],
        paint: {
          'circle-color': ['case',
            ['>', ['get', 'sunny'], 0], '#F5A623',
            ['>', ['get', 'soonSunny'], 0], '#FFFFFF',
            '#9E9E9E'],
          'circle-radius': ['step', ['get', 'point_count'], 14, 5, 18, 15, 22, 50, 26],
          'circle-stroke-width': 2,
          'circle-stroke-color': '#FFFFFF',
          'circle-opacity': 0.95,
        },
      });
      map.addLayer({
        id: 'soleia-cluster-count', type: 'symbol', source: 'soleia-terraces',
        filter: ['has', 'point_count'],
        layout: {
          'text-field': ['get', 'point_count_abbreviated'],
          'text-font': ['Open Sans Bold', 'Arial Unicode MS Bold'],
          'text-size': 13,
          'text-allow-overlap': true,
        },
        paint: { 'text-color': '#FFFFFF' },
      });
      map.addLayer({
        id: 'soleia-unclustered', type: 'circle', source: 'soleia-terraces',
        filter: ['!', ['has', 'point_count']],
        paint: {
          'circle-color': ['case',
            ['==', ['get', 'sunny'], 1], '#F5A623',
            ['==', ['get', 'soonSunny'], 1], '#FFFFFF',
            '#9E9E9E'],
          'circle-radius': 6,
          'circle-stroke-width': 2,
          'circle-stroke-color': '#FFFFFF',
          'circle-opacity': 0.95,
        },
      });
      map.on('click', 'soleia-clusters', function (e) {
        var f = (e.features || [])[0]; if (!f) return;
        map.getSource('soleia-terraces').getClusterExpansionZoom(f.properties.cluster_id, function (err, zoom) {
          if (err) return; map.easeTo({ center: f.geometry.coordinates, zoom: zoom });
        });
      });
      map.on('click', 'soleia-unclustered', function (e) {
        var f = (e.features || [])[0]; if (!f) return;
        dbg('[click] terrace ' + f.properties.id + ' (' + f.properties.name + ')');
      });

      // User dot + pulse
      map.addSource('soleia-user', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({ id: 'soleia-user-pulse', type: 'circle', source: 'soleia-user',
        paint: { 'circle-color': '#4285F4', 'circle-radius': 18, 'circle-opacity': 0.18 } });
      map.addLayer({ id: 'soleia-user-dot', type: 'circle', source: 'soleia-user',
        paint: { 'circle-color': '#4285F4', 'circle-radius': 7, 'circle-stroke-width': 2.5, 'circle-stroke-color': '#FFFFFF' } });
      var pulseT = 0;
      setInterval(function () {
        try {
          pulseT = (pulseT + 0.05) % (Math.PI * 2);
          var r = 14 + Math.sin(pulseT) * 6;
          map.setPaintProperty('soleia-user-pulse', 'circle-radius', r);
        } catch (e) {}
      }, 60);

      // ShadeMap
      try {
        shadeMap = new ShadeMap({
          apiKey: SHADEMAP_KEY,
          date: nowDate,
          color: '#01112f',
          opacity: 0.7,
          terrainSource: {
            maxZoom: 15, tileSize: 256,
            getSourceUrl: function (a) { return 'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/' + a.z + '/' + a.x + '/' + a.y + '.png'; },
            getElevation: function (a) { return a.r * 256 + a.g + a.b / 256 - 32768; },
          },
          getFeatures: function () {
            return mapLoaded(map).then(function () {
              var feats = map.querySourceFeatures('composite', { sourceLayer: 'building' });
              return (feats || []).filter(function (f) {
                return f.properties && f.properties.underground !== 'true' && (f.properties.height || f.properties.render_height);
              });
            });
          },
          debug: function (m) { dbg('[shade] ' + m); },
        }).addTo(map);
        dbg('[shade] ready');
      } catch (e) { dbg('[shade ERR] ' + e.message); }

      dbg('[map] READY - try the buttons');
    });

    // ─── Test functions exposed to global ───────────────────────────────
    window.testTerraces = function () {
      var feats = [
        { type: 'Feature', geometry: { type: 'Point', coordinates: [-1.5536, 47.2184] }, properties: { id: 't1', name: 'Test 1 SUN', sunny: 1, soonSunny: 0 } },
        { type: 'Feature', geometry: { type: 'Point', coordinates: [-1.555, 47.219] }, properties: { id: 't2', name: 'Test 2 SOON', sunny: 0, soonSunny: 1 } },
        { type: 'Feature', geometry: { type: 'Point', coordinates: [-1.552, 47.217] }, properties: { id: 't3', name: 'Test 3 SHADE', sunny: 0, soonSunny: 0 } },
        { type: 'Feature', geometry: { type: 'Point', coordinates: [-1.554, 47.220] }, properties: { id: 't4', name: 'Test 4 SUN', sunny: 1, soonSunny: 0 } },
        { type: 'Feature', geometry: { type: 'Point', coordinates: [-1.557, 47.216] }, properties: { id: 't5', name: 'Test 5 SOON', sunny: 0, soonSunny: 1 } },
      ];
      map.getSource('soleia-terraces').setData({ type: 'FeatureCollection', features: feats });
      dbg('[inject] 5 terraces');
    };
    window.testManyTerraces = function () {
      var feats = [];
      for (var i = 0; i < 50; i++) {
        var lat = 47.2184 + (Math.random() - 0.5) * 0.01;
        var lng = -1.5536 + (Math.random() - 0.5) * 0.01;
        var status = Math.random();
        feats.push({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lng, lat] },
          properties: {
            id: 'auto' + i, name: 'Auto ' + i,
            sunny: status < 0.4 ? 1 : 0,
            soonSunny: status >= 0.4 && status < 0.6 ? 1 : 0,
          },
        });
      }
      map.getSource('soleia-terraces').setData({ type: 'FeatureCollection', features: feats });
      dbg('[inject] 50 terraces - zoom out to see clusters');
    };
    window.testUserLoc = function () {
      map.getSource('soleia-user').setData({
        type: 'FeatureCollection',
        features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: [-1.5536, 47.2184] }, properties: {} }],
      });
      dbg('[user] blue pulsing dot at Nantes center');
    };

    // Time slider -> ShadeMap.setDate
    var slider = document.getElementById('timeSlider');
    var timeLabel = document.getElementById('timeLabel');
    function fmtMin(m) {
      var h = Math.floor(m / 60), mm = m % 60;
      return (h < 10 ? '0' : '') + h + ':' + (mm < 10 ? '0' : '') + mm;
    }
    timeLabel.textContent = fmtMin(parseInt(slider.value));
    slider.addEventListener('input', function () {
      var mins = parseInt(slider.value);
      timeLabel.textContent = fmtMin(mins);
      var d = new Date();
      d.setHours(Math.floor(mins / 60), mins % 60, 0, 0);
      if (shadeMap) shadeMap.setDate(d);
    });
  </script>
</body>
</html>
